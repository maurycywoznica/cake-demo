services:
  caked:
    build: .
    image: caked-clone:latest
    container_name: caked-app
    ports:
      # Bind only to localhost — reverse proxy (nginx/Traefik) forwards traffic.
      # Host port 8765 jest nietypowy, nie koliduje z 80/443/3000/8080.
      - "127.0.0.1:8765:80"
    restart: unless-stopped
